{% extends "main.html" %}

{% block content %}
<style>
.hero {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 5rem 4rem;
  width: 100%;
  margin: 0;
  box-sizing: border-box;
}
.hero-left {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.hero-title {
  display: inline-flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}
.hero-logo {
  width: 72px;
  height: 72px;
  display: block;
}
.hero-left h1 {
  font-size: 4.4rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  margin: 0;
  line-height: 1.02;
}
.hero-left p {
  font-size: 1.1rem;
  line-height: 1.8;
  opacity: 0.92;
  margin: 1.8rem 0 0;
  max-width: 720px;
}
.hero-install {
  background: #0f1720;
  color: #a8ff78;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.95rem;
  padding: 1rem 1.35rem;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  margin-top: 2rem;
}
.md-sidebar { display: none !important; }
.md-content { margin: 0 !important; max-width: 100% !important; padding: 0 !important; }
.md-main__inner { padding-top: 0 !important; }
@media (max-width: 960px) {
  .hero {
    flex-direction: column;
    padding: 3.5rem 2rem;
  }
}
</style>

<div class="hero">
  <div class="hero-left">
    <div class="hero-title">
      <svg width="72" height="72" viewBox="0 0 120 120" class="hero-logo" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2b81ff"/>
            <stop offset="100%" stop-color="#0b4bc1"/>
          </linearGradient>
        </defs>
        <rect x="6" y="10" width="108" height="100" rx="30" fill="url(#bg)"/>
        <path d="M36 46 C36 36 44 30 60 30 C76 30 84 36 84 46 C100 46 104 60 104 64 C104 88 86 104 60 104 C34 104 16 88 16 64 C16 60 20 46 36 46 Z" fill="#0f4b9f"/>
        <path d="M44 60 L54 78 L66 58 L80 78" fill="none" stroke="#c3f6ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M44 52 L56 40 L68 52" fill="none" stroke="#d1f5ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="64" cy="66" r="10" fill="#8cd5ff" opacity="0.8"/>
      </svg>
      <h1>valkit</h1>
    </div>
    <p>Financial statement analysis for AI IDEs and coding agents. Scan any ticker, get Piotroski, Altman Z, Beneish M, and a deterministic analyst brief in one command.</p>
    <div class="hero-install">$ pip install valkit</div>
  </div>
</div>

{{ page.content }}
{% endblock %}
